<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Qu'an — Breach Detector</title>
<style>
  :root{
    --bg:#0a0a0b; --panel:#121214; --line:#26262a;
    --cream:#cfcabb; --cream-dim:#8a8678; --label:#7d7a6e;
    --pink:#d36b9b; --blue:#5aa0d8; --breach:#e85c5c; --gold:#cfa6a0; --price:#e0b15a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--cream);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;overflow:hidden;}
  .wrap{height:100vh;display:flex;flex-direction:column;padding:14px 18px 12px;gap:12px;}

  header{display:flex;align-items:center;justify-content:space-between;gap:14px;flex:0 0 auto;flex-wrap:wrap;}
  .brand{display:flex;align-items:baseline;gap:11px;min-width:0;}
  .brand .inf{font-size:24px;line-height:1;color:#e8e2d2;}
  .brand .name{font-family:Georgia,'Times New Roman',serif;font-size:15px;letter-spacing:.28em;
    color:var(--gold);text-transform:uppercase;white-space:nowrap;}
  .brand .sub{font-family:Georgia,serif;font-size:10px;letter-spacing:.2em;color:var(--label);
    text-transform:uppercase;white-space:nowrap;}

  .hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .stat{background:var(--panel);border:0.5px solid var(--line);border-radius:6px;
    padding:6px 12px;display:flex;flex-direction:column;gap:2px;}
  .stat .k{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--label);}
  .stat .v{font-size:14px;font-weight:500;font-family:'SF Mono',Menlo,monospace;line-height:1.1;}
  #breachCount{color:var(--breach);}

  .field{background:#16161a;border:0.5px solid #34343a;border-radius:6px;color:var(--cream);
    font-size:11px;padding:8px 10px;font-family:inherit;cursor:pointer;}
  .field:focus{outline:none;border-color:#55555e;}
  .clearbtn{background:#16161a;border:0.5px solid #34343a;border-radius:6px;color:var(--cream-dim);
    font-size:13px;line-height:1;padding:7px 10px;cursor:pointer;transition:border-color .15s,color .15s,background .15s;}
  .clearbtn:hover{border-color:var(--breach);color:var(--breach);background:#1a1416;}
  .upload{display:inline-flex;align-items:center;gap:9px;background:#16161a;border:0.5px solid #34343a;
    border-radius:6px;padding:8px 13px;cursor:pointer;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--cream);transition:border-color .15s,background .15s;}
  .upload:hover{border-color:#55555e;background:#1c1c21;}
  .upload .fn{font-size:10px;letter-spacing:.04em;text-transform:none;color:var(--cream-dim);
    max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .upload input{display:none;}
  .toggle{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--cream-dim);cursor:pointer;user-select:none;}
  .toggle input{accent-color:var(--price);cursor:pointer;width:14px;height:14px;}

  .chartwrap{position:relative;flex:1 1 auto;border:0.5px solid var(--line);border-radius:7px;overflow:hidden;min-height:0;}
  .chartwrap canvas{display:block;width:100%;height:100%;}
  .chart-title{position:absolute;top:9px;right:14px;font-family:Georgia,serif;font-size:11px;
    letter-spacing:.16em;color:#7a7568;z-index:2;pointer-events:none;}
  .chart-foot{position:absolute;bottom:9px;left:14px;font-family:Georgia,serif;font-style:italic;
    font-size:11px;color:#5a574d;z-index:2;pointer-events:none;}

  #dotTip{position:absolute;pointer-events:none;display:none;background:#1a1a1f;border:0.5px solid #3a3a42;
    border-radius:6px;padding:5px 9px;font-family:'SF Mono',Menlo,monospace;font-size:11px;color:var(--cream);
    white-space:nowrap;transform:translate(-50%,-135%);z-index:5;}
  #dotTip b{color:#7fd1e0;}
  footer{flex:0 0 auto;display:flex;align-items:center;gap:18px;}
  .legend{display:flex;gap:18px;font-size:11px;color:var(--cream-dim);flex:0 0 auto;}
  .legend .sw{display:inline-block;width:14px;height:2px;vertical-align:middle;margin-right:6px;}
  .legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:6px;}
  .breaches{flex:1 1 auto;min-width:0;display:flex;gap:10px;overflow-x:auto;
    font-family:'SF Mono',Menlo,monospace;font-size:11px;color:var(--cream-dim);padding-bottom:2px;}
  .breaches .chip{flex:0 0 auto;background:var(--panel);border:0.5px solid var(--line);border-radius:5px;
    padding:5px 9px;white-space:nowrap;cursor:default;transition:border-color .12s,color .12s,background .12s;}
  .breaches .chip:hover{border-color:var(--breach);color:var(--cream);background:#1a1416;}
  .breaches .empty{color:var(--label);}
  .breaches::-webkit-scrollbar{height:6px;}
  .breaches::-webkit-scrollbar-thumb{background:#2c2c30;border-radius:3px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">

  </header>

  <div class="chartwrap">

    <span class="chart-foot">Time State Compass</span>
    <canvas id="compassChart"></canvas>
    <div id="dotTip"></div>
  </div>

  <footer>
    <div class="legend">
      <span><span class="sw" style="background:var(--pink)"></span>PG/PC</span>
      <span><span class="sw" style="background:var(--blue)"></span>PC/PG</span>
      <span><span class="dot" style="background:var(--breach)"></span>Breach</span>
      <span><span class="sw" style="background:var(--price)"></span>Price (session time)</span>

      <span><span class="sw" style="background:#e69f00"></span>PC/PG 6th fit</span>
    </div>
    <div class="breaches" id="breachList"><span class="empty">&mdash; load a CSV to detect breaches</span></div>
  </footer>

</div>

  function todayISO(){ const d=new Date();

  // CME futures session bucketing: a session runs 6:00pm ET (prev day) -> 5:00pm ET.
  // A bar's session date = its ET calendar date, rolled to the next day if ET hour >= 18.
  const _etFmt=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour12:false,
    year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit'});
  function sessionDate(tSec){
    const P={}; for(const part of _etFmt.formatToParts(new Date(tSec*1000))) P[part.type]=part.value;
    let h=+P.hour; if(h>=24) h-=24;
    const dt=new Date(Date.UTC(+P.year,(+P.month)-1,+P.day));
    if(h>=18) dt.setUTCDate(dt.getUTCDate()+1);
    return dt.toISOString().slice(0,10);
  }

  const _etClock=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour12:false,

    const P={}; for(const p of _etClock.formatToParts(new Date())) P[p.type]=p.value;
    let h=+P.hour; if(h>=24) h-=24;
    const sod=h*3600+(+P.minute)*60+(+P.second);
    let el=(h>=18)?(sod-64800):(sod+21600);   // seconds since the 18:00 ET open
    let pt=el/82800;                            // 23h = 82800s
    return pt<0?0:(pt>1?1:pt);
  }

    let h=+P.hour; if(h>=24) h-=24;
    const sod=h*3600+(+P.minute)*60+(+P.second);

  function parseCSV(text){
    const lines=text.trim().split('\n'); const head=lines[0].split(',').map(h=>h.trim()); const out=[];

      const v=lines[i].split(',').map(s=>s.trim()); const o={};

  }
  function parsePrice(text){
    const lines=text.trim().split('\n');
    const head=lines[0].split(',').map(h=>h.trim().toLowerCase());
    let ti=head.indexOf('time'); if(ti<0) ti=0;
    let ci=head.indexOf('close'); if(ci<0) ci=head.length-1;
    const out=[];
    for(let i=1;i<lines.length;i++){
      const v=lines[i].split(','); const t=parseFloat(v[ti]),c=parseFloat(v[ci]);

    out.sort((a,b)=>a[0]-b[0]);

  }

  function computeBreaches(){
    breaches=[];

      if((d1<=0&&d2>0)||(d1>0&&d2<=0)){ const t=-d1/(d2-d1); breaches.push({cw:cw1+t*(cw2-cw1),val:m1+t*(m2-m1)}); }

    const n=xs.length,m=deg+1;
    const S=new Array(2*deg+1).fill(0), B=new Array(m).fill(0);
    for(let i=0;i<n;i++){ let xp=1; for(let k=0;k<=2*deg;k++){ S[k]+=xp; if(k<m) B[k]+=ys[i]*xp; xp*=xs[i]; } }
    const M=[]; for(let r=0;r<m;r++){ const row=[]; for(let c=0;c<m;c++) row.push(S[r+c]); row.push(B[r]); M.push(row); }
    for(let c=0;c<m;c++){
      let piv=c; for(let r=c+1;r<m;r++) if(Math.abs(M[r][c])>Math.abs(M[piv][c])) piv=r;
      const tmp=M[c]; M[c]=M[piv]; M[piv]=tmp;
      const d=M[c][c]; if(Math.abs(d)<1e-12) continue;
      for(let cc=c;cc<=m;cc++) M[c][cc]/=d;
      for(let r=0;r<m;r++){ if(r===c) continue; const f=M[r][c]; for(let cc=c;cc<=m;cc++) M[r][cc]-=f*M[c][cc]; }
    }
    return M.map(row=>row[m]);
  }
  function polyval(c,x){ let v=0,xp=1; for(let k=0;k<c.length;k++){ v+=c[k]*xp; xp*=x; } return v; }
  function drawPoly(coef,x0,x1,mapX,mapY,pW,pH,stroke,dash){
    ctx.save();
    ctx.beginPath(); ctx.rect(PAD_L,PAD_T,pW,pH); ctx.clip();   // keep edge overshoot inside the plot
    ctx.strokeStyle=stroke; ctx.lineWidth=1.8; ctx.lineJoin='round'; ctx.shadowColor=stroke; ctx.shadowBlur=4;
    ctx.setLineDash(dash||[]);
    ctx.beginPath();
    const N=180;
    for(let i=0;i<=N;i++){ const x=x0+(x1-x0)*i/N, X=mapX(x), Y=mapY(polyval(coef,x)); i?ctx.lineTo(X,Y):ctx.moveTo(X,Y); }
    ctx.stroke(); ctx.restore();
  }

  function startPulse(idx){ highlightIdx=idx; t0=performance.now(); if(!rafId) rafId=requestAnimationFrame(loop); }
  function stopPulse(){ highlightIdx=-1; if(rafId){cancelAnimationFrame(rafId);rafId=null;} draw(); }
  function loop(now){ draw(now); rafId=requestAnimationFrame(loop); }

  // CW -> CME clock time. Session opens 18:00 ET; CW is the session fraction from the open
  // (CW * 23h). Negative CW runs backward into negation time before the open.
  function cwClock(cw){
    let total=Math.round(64800+cw*82800);        // 64800 = 18:00 ET in seconds; 82800 = 23h
    total=((total%86400)+86400)%86400;           // wrap into one ET day (handles negative CW)
    let h=Math.floor(total/3600), m=Math.floor((total%3600)/60);
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  }
  function showTip(i,x,y){ const b=breaches[i];
    dotTip.innerHTML='<b>'+cwClock(b.cw)+' ET</b> &middot; CW '+b.cw.toFixed(3);
    dotTip.style.left=x+'px'; dotTip.style.top=y+'px'; dotTip.style.display='block'; }
  function hideTip(){ dotTip.style.display='none'; }
  canvas.addEventListener('mousemove', e=>{
    const r=canvas.getBoundingClientRect(); const mx=e.clientX-r.left, my=e.clientY-r.top;
    let hit=-1, best=12;
    for(let i=0;i<breachScreen.length;i++){ const d=Math.hypot(mx-breachScreen[i].x,my-breachScreen[i].y); if(d<best){best=d;hit=i;} }
    if(hit>=0){ canvas.style.cursor='pointer'; if(highlightIdx!==hit) startPulse(hit); showTip(hit,breachScreen[hit].x,breachScreen[hit].y); }
    else { canvas.style.cursor='default'; hideTip(); if(highlightIdx>=0) stopPulse(); }
  });
  canvas.addEventListener('mouseleave', ()=>{ hideTip(); canvas.style.cursor='default'; stopPulse(); });

  function draw(now){
    if(!W||!H) return; now=(typeof now==='number')?now:0;
    const priceShown = priceToggle.checked && price.length>1;
    const padR = priceShown ? 56 : 24;
    ctx.clearRect(0,0,W,H); ctx.fillStyle='#0a0a0b'; ctx.fillRect(0,0,W,H);
    const pW=W-PAD_L-padR, pH=H-PAD_T-PAD_B; const [ylo,yhi]=yExtent();
    const mapX=cw=>PAD_L+((cw+1)/2)*pW, mapY=val=>PAD_T+(1-(val-ylo)/(yhi-ylo))*pH;
    const cx=mapX(0), cy=(ylo<=0&&yhi>=0)?mapY(0):(PAD_T+pH);

    ctx.save(); ctx.beginPath(); ctx.rect(PAD_L,PAD_T,pW,pH); ctx.clip();
    const R='rgba(110,26,26,0.42)',G='rgba(38,70,34,0.42)';
    ctx.fillStyle=R; ctx.fillRect(PAD_L,PAD_T,cx-PAD_L,cy-PAD_T);
    ctx.fillStyle=G; ctx.fillRect(PAD_L,cy,cx-PAD_L,(PAD_T+pH)-cy);
    ctx.fillStyle=G; ctx.fillRect(cx,PAD_T,(PAD_L+pW)-cx,cy-PAD_T);
    ctx.fillStyle=R; ctx.fillRect(cx,cy,(PAD_L+pW)-cx,(PAD_T+pH)-cy);
    ctx.strokeStyle='rgba(220,210,190,0.05)'; ctx.lineWidth=1;
    for(let a=0;a<12;a++){const ang=(a/12)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(ang)*pW,cy+Math.sin(ang)*pW);ctx.stroke();}
    ctx.restore();

    ctx.strokeStyle='rgba(150,150,150,0.06)'; ctx.lineWidth=0.5;
    for(let v=-1;v<=1.0001;v+=0.1){const x=mapX(v);ctx.beginPath();ctx.moveTo(x,PAD_T);ctx.lineTo(x,PAD_T+pH);ctx.stroke();}
    ctx.strokeStyle='rgba(207,202,187,0.80)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(PAD_L,cy); ctx.lineTo(PAD_L+pW,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,PAD_T); ctx.lineTo(cx,PAD_T+pH); ctx.stroke();

    ctx.fillStyle='#8a8678'; ctx.font='10px -apple-system,Segoe UI,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
    for(let i=-10;i<=10;i++){ const v=i/10,x=mapX(v),major=(i%2===0);
      ctx.strokeStyle='rgba(207,202,187,'+(major?0.6:0.35)+')'; ctx.lineWidth=major?1:0.5;
      ctx.beginPath(); ctx.moveTo(x,cy-(major?5:3)); ctx.lineTo(x,cy+(major?5:3)); ctx.stroke();
      if(major) ctx.fillText(v.toFixed(1).replace('-0.0','0.0'),x,cy+7); }
    ctx.textAlign='right'; ctx.textBaseline='middle';
    for(let i=0;i<=4;i++){ const val=ylo+(i/4)*(yhi-ylo),y=mapY(val);
      ctx.strokeStyle='rgba(207,202,187,0.45)'; ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.moveTo(PAD_L-4,y); ctx.lineTo(PAD_L,y); ctx.stroke();
      ctx.fillStyle='#8a8678'; ctx.fillText(fmt(val),PAD_L-7,y); }

    // tension curves
    if(data.length){
      const ptsM=data.map(d=>({x:mapX(d[COL_X]),y:mapY(d[COL_MANIF])}));
      const ptsS=data.map(d=>({x:mapX(d[COL_X]),y:mapY(d[COL_SIXTH])}));
      drawCurve(ptsM,'#d36b9b','rgba(211,107,155,0.5)');
      drawCurve(ptsS,'#5aa0d8','rgba(90,160,216,0.5)');
      if(polyToggle.checked && data.length>=7){
        const xs=data.map(d=>d[COL_X]);
        const x0=Math.min.apply(null,xs), x1=Math.max.apply(null,xs);
        drawPoly(polyfit(xs,data.map(d=>d[COL_MANIF]),6),x0,x1,mapX,mapY,pW,pH,'#f5f1e6',[7,5]);   // PG/PC fit — white, long dash
        drawPoly(polyfit(xs,data.map(d=>d[COL_SIXTH]),6),x0,x1,mapX,mapY,pW,pH,'#e69f00',[3,4]);   // PC/PG fit — orange, short dash
      }
    }

    // price overlay — mapped by session time across width, own right axis
    if(priceShown){
      let pmin=Infinity,pmax=-Infinity;
      for(const r of price){ if(r[1]<pmin)pmin=r[1]; if(r[1]>pmax)pmax=r[1]; }
      if(pmax===pmin){pmax+=1;pmin-=1;} const pp=(pmax-pmin)*0.06; pmin-=pp; pmax+=pp;
      const px=t=>PAD_L+sessionFrac(t)*pW, py=c=>PAD_T+(1-(c-pmin)/(pmax-pmin))*pH;   // x anchored by session-t (open at left edge)
      ctx.save();
      ctx.strokeStyle='#e0b15a'; ctx.lineWidth=1.6; ctx.lineJoin='round';
      ctx.shadowColor='rgba(224,177,90,0.4)'; ctx.shadowBlur=5;
      ctx.beginPath();
      for(let i=0;i<price.length;i++){const x=px(price[i][0]),y=py(price[i][1]); i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
      ctx.stroke(); ctx.shadowBlur=0;
      ctx.fillStyle='#c9a76a'; ctx.textAlign='left'; ctx.textBaseline='middle';
      for(let i=0;i<=4;i++){ const c=pmin+(i/4)*(pmax-pmin),y=py(c);
        ctx.strokeStyle='rgba(224,177,90,0.4)'; ctx.lineWidth=0.5;
        ctx.beginPath(); ctx.moveTo(PAD_L+pW,y); ctx.lineTo(PAD_L+pW+4,y); ctx.stroke();
        ctx.fillText(fmt(c),PAD_L+pW+7,y); }
      ctx.restore();
    }

    // breaches on top
    for(let i=0;i<breaches.length;i++){ if(i!==highlightIdx) drawBreach(breaches[i],false,mapX,mapY,pH,now); }
    if(highlightIdx>=0&&highlightIdx<breaches.length) drawBreach(breaches[highlightIdx],true,mapX,mapY,pH,now);
    breachScreen=breaches.map(b=>({x:mapX(b.cw),y:mapY(b.val)}));

    updateStats();
  }
  function drawBreach(b,hl,mapX,mapY,pH,now){
    const bx=mapX(b.cw),by=mapY(b.val);
    ctx.strokeStyle=hl?'rgba(244,120,120,0.95)':'rgba(232,92,92,0.62)'; ctx.lineWidth=hl?1.8:1.4; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(bx,PAD_T); ctx.lineTo(bx,PAD_T+pH); ctx.stroke(); ctx.setLineDash([]);
    if(hl){ const phase=((now-t0)%900)/900;
      ctx.strokeStyle='rgba(244,120,120,'+(0.85*(1-phase)).toFixed(3)+')'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(bx,by,5.5+phase*18,0,Math.PI*2); ctx.stroke(); }
    ctx.shadowColor='#e85c5c'; ctx.shadowBlur=hl?18:11; ctx.fillStyle=hl?'#ff8a8a':'#e85c5c';
    ctx.beginPath(); ctx.arc(bx,by,hl?5.5:4.5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  }
  function drawCurve(pts,stroke,glow){
    ctx.save(); ctx.shadowColor=glow; ctx.shadowBlur=7; ctx.strokeStyle=stroke; ctx.lineWidth=2.2; ctx.lineJoin='round';
    ctx.beginPath(); smoothPath(pts); ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle=stroke; for(const p of pts){ctx.beginPath();ctx.arc(p.x,p.y,1.4,0,Math.PI*2);ctx.fill();} ctx.restore();
  }
  function updateStats(){
    if(!breaches.length){
      elCount.textContent=data.length?'0':'\u2014'; elRange.textContent='\u2014';
      elList.innerHTML='<span class="empty">'+(data.length?'no breaches this day':'\u2014 load a CSV to detect breaches')+'</span>';
      return;
    }
    elCount.textContent=breaches.length;
    const cws=breaches.map(b=>b.cw);
    elRange.textContent=Math.min(...cws).toFixed(3)+' \u2192 '+Math.max(...cws).toFixed(3);
    elList.innerHTML=breaches.map((b,i)=>'<span class="chip" data-idx="'+i+'">CW '+b.cw.toFixed(4)+' &nbsp; T '+fmt(b.val)+'</span>').join('');
    elList.querySelectorAll('.chip').forEach(ch=>{
      ch.addEventListener('mouseenter',()=>startPulse(+ch.dataset.idx));
      ch.addEventListener('mouseleave',stopPulse);
    });
  }

  async function selectInst(sym){
    inst=sym; instSelect.value=sym; await KV.set(SEL_KEY,sym);
    const b=warehouse[inst]||{}; const dates=Object.keys(b).sort();
    let d=dayDate.value; if(!b[d]) d=dates.length?dates[dates.length-1]:(d||todayISO());
    show(d);
  }
  instSelect.addEventListener('change',()=>selectInst(instSelect.value));

  (async function init(){
    dayDate.value=todayISO();
    let wh=await KV.get(WH_KEY)||{};
    if(Object.keys(wh).some(k=>/^\d{4}-\d{2}-\d{2}$/.test(k))) wh={NQ:wh}; // migrate flat -> nested
    warehouse=wh;
    warehouse.NQ=warehouse.NQ||{};
    for(const d in BAKED_PRICE){               // backfill price under NQ
      if(!warehouse.NQ[d]) warehouse.NQ[d]={rows:[],price:BAKED_PRICE[d]};
      else if(!warehouse.NQ[d].price||!warehouse.NQ[d].price.length) warehouse.NQ[d].price=BAKED_PRICE[d];
    }
    instSelect.innerHTML=INSTRUMENTS.map(function(p){return '<option value="'+p[0]+'">'+p[1]+'</option>';}).join('');
    const sel=await KV.get(SEL_KEY); inst=(sel&&INSTRUMENTS.some(p=>p[0]===sel))?sel:'NQ';
    instSelect.value=inst;
    const b=warehouse[inst]||{}; const dates=Object.keys(b).sort();
    if(dates.length) show(dates[dates.length-1]); else sizeCanvas();
  })();
})();
</script>
</body>
